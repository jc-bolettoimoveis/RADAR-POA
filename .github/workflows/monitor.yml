name: Radar de Captação

on:
  schedule:
    - cron: "0 10 * * *"   # 07:00 Brasília
    - cron: "0 17 * * *"   # 14:00 Brasília
  workflow_dispatch:        # botão "Run workflow" para rodar manualmente

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Monitorar sites
        env:
          JETIMOB_FEED_URL: ${{ secrets.JETIMOB_FEED_URL }}
          WHATSAPP_DESTINOS: ${{ secrets.WHATSAPP_DESTINOS }}
          WA_META_TOKEN: ${{ secrets.WA_META_TOKEN }}
          WA_META_PHONE_ID: ${{ secrets.WA_META_PHONE_ID }}
          WA_META_DESTINOS: ${{ secrets.WA_META_DESTINOS }}
          PAINEL_URL: ${{ secrets.PAINEL_URL }}
        run: python monitor/monitor.py
      - name: Gerar painel
        run: python site/build_site.py
      - name: Salvar resultados
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "radar: atualização automática"
          git push
