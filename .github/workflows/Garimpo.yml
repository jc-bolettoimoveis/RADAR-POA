name: Garimpo do estoque

on:
  schedule:
    - cron: "30 1,4,7 * * *"
  workflow_dispatch:
    inputs:
      lote:
        description: "Anúncios por lote (padrão 1200)"
        default: "1200"

permissions:
  contents: write

concurrency:
  group: radar-dados
  cancel-in-progress: false

jobs:
  garimpo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Garimpar estoque
        env:
          GARIMPO_LOTE: ${{ github.event.inputs.lote }}
          WHATSAPP_DESTINOS: ${{ secrets.WHATSAPP_DESTINOS }}
          PAINEL_URL: ${{ secrets.PAINEL_URL }}
        run: python monitor/garimpo.py
      - name: Gerar painel e salvar
        run: |
          python site/build_site.py
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "garimpo: lote processado"
          git pull --rebase --autostash origin main
          git push
