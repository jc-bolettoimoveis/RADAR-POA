name: Auditoria de endereços

on:
  workflow_dispatch:
    inputs:
      amostra:
        description: "Anúncios por site (padrão 10)"
        default: "10"

permissions:
  contents: write

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Rodar auditoria
        env:
          AMOSTRA_POR_SITE: ${{ github.event.inputs.amostra }}
        run: python monitor/auditoria_enderecos.py
      - name: Salvar resultado
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/auditoria.json docs/auditoria.csv
          git diff --cached --quiet || git commit -m "auditoria de endereços"
          git push
